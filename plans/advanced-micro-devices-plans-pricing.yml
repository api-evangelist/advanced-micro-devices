specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Advanced Micro Devices
providerId: advanced-micro-devices
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: AMD does not sell APIs as a stand-alone product with published per-call pricing. The AMD
  Developer Cloud and ROCm software stack are accessed via developer accounts; production GPU
  capacity is purchased through OEMs, hyperscalers (AWS, Azure, OCI), or AMD-direct enterprise
  agreements. No self-service API pricing page exists.
tags:
  - AI
  - GPU
  - HPC
  - Semiconductor
description: AMD does not publish a per-call API pricing page. Developer Cloud provides hosted
  GPU access for evaluation; production usage is priced via cloud-provider GPU instance rates
  (e.g. AWS, Azure, OCI MI300X/MI250X SKUs) or AMD enterprise agreements. ROCm itself is open
  source and free to use.
sources:
  - https://www.amd.com/en/developer.html
  - https://rocm.docs.amd.com/
plans:
  - id: advanced-micro-devices-developer-cloud
    name: AMD Developer Cloud
    type: freemium
    description: Hosted GPU access for AMD developers; allocations granted via application.
    entries:
      - label: Allocated GPU access
        name: developer_cloud
        type: quota
        metric: hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see https://www.amd.com/en/developer/resources/cloud-access.html
        userMultiplied: false
    elements:
      - name: AMD Instinct GPU access
      - name: ROCm pre-installed
      - name: Application-based allocation
  - id: advanced-micro-devices-rocm
    name: ROCm Software
    type: freemium
    description: Open-source HPC/AI compute platform for AMD GPUs. Free; runs on customer-owned
      or rented hardware.
    entries:
      - label: ROCm runtime
        name: rocm
        type: quota
        metric: install
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: HIP runtime
      - name: ROCm libraries
      - name: Open source under MIT license
  - id: advanced-micro-devices-enterprise
    name: Enterprise / OEM
    type: enterprise
    description: GPU capacity purchased via OEMs, hyperscalers, or AMD-direct agreements.
    entries:
      - label: Custom contract
        name: custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Instinct MI300X / MI325X
      - name: EPYC accelerator integration
      - name: Hyperscaler distribution
