naftiko: 1.0.0-alpha2
info:
  label: AMD Developer Cloud API — Credits
  description: 'AMD Developer Cloud API — Credits. 1 operations. Lead operation: AMD Developer Cloud Get Credit Balance. Self-contained
    Naftiko capability covering one Advanced Micro Devices business surface.'
  tags:
  - Advanced Micro Devices
  - Credits
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADVANCED_MICRO_DEVICES_API_KEY: ADVANCED_MICRO_DEVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: amd-developer-cloud-credits
    baseUri: https://api.developer.amd.com/v1
    description: AMD Developer Cloud API — Credits business capability. Self-contained, no shared references.
    resources:
    - name: credits
      path: /credits
      operations:
      - name: getcredits
        method: GET
        description: AMD Developer Cloud Get Credit Balance
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADVANCED_MICRO_DEVICES_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amd-developer-cloud-credits-rest
    port: 8080
    description: REST adapter for AMD Developer Cloud API — Credits. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/credits
      name: credits
      description: REST surface for credits.
      operations:
      - method: GET
        name: getcredits
        description: AMD Developer Cloud Get Credit Balance
        call: amd-developer-cloud-credits.getcredits
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amd-developer-cloud-credits-mcp
    port: 9090
    transport: http
    description: MCP adapter for AMD Developer Cloud API — Credits. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amd-developer-cloud-get-credit
      description: AMD Developer Cloud Get Credit Balance
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amd-developer-cloud-credits.getcredits
      outputParameters:
      - type: object
        mapping: $.
