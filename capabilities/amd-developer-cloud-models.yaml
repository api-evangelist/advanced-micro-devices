naftiko: 1.0.0-alpha2
info:
  label: AMD Developer Cloud API — Models
  description: 'AMD Developer Cloud API — Models. 2 operations. Lead operation: AMD Developer Cloud List Deployed Models.
    Self-contained Naftiko capability covering one Advanced Micro Devices business surface.'
  tags:
  - Advanced Micro Devices
  - Models
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADVANCED_MICRO_DEVICES_API_KEY: ADVANCED_MICRO_DEVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: amd-developer-cloud-models
    baseUri: https://api.developer.amd.com/v1
    description: AMD Developer Cloud API — Models business capability. Self-contained, no shared references.
    resources:
    - name: models
      path: /models
      operations:
      - name: listmodels
        method: GET
        description: AMD Developer Cloud List Deployed Models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deploymodel
        method: POST
        description: AMD Developer Cloud Deploy AI Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-Key
      value: '{{env.ADVANCED_MICRO_DEVICES_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amd-developer-cloud-models-rest
    port: 8080
    description: REST adapter for AMD Developer Cloud API — Models. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/models
      name: models
      description: REST surface for models.
      operations:
      - method: GET
        name: listmodels
        description: AMD Developer Cloud List Deployed Models
        call: amd-developer-cloud-models.listmodels
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: deploymodel
        description: AMD Developer Cloud Deploy AI Model
        call: amd-developer-cloud-models.deploymodel
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amd-developer-cloud-models-mcp
    port: 9090
    transport: http
    description: MCP adapter for AMD Developer Cloud API — Models. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amd-developer-cloud-list-deployed
      description: AMD Developer Cloud List Deployed Models
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amd-developer-cloud-models.listmodels
      outputParameters:
      - type: object
        mapping: $.
    - name: amd-developer-cloud-deploy-ai
      description: AMD Developer Cloud Deploy AI Model
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amd-developer-cloud-models.deploymodel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
