naftiko: 1.0.0-alpha2
info:
  label: AMD ROCm Management API — Devices
  description: 'AMD ROCm Management API — Devices. 2 operations. Lead operation: AMD ROCm List GPU Devices. Self-contained
    Naftiko capability covering one Advanced Micro Devices business surface.'
  tags:
  - Advanced Micro Devices
  - Devices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADVANCED_MICRO_DEVICES_API_KEY: ADVANCED_MICRO_DEVICES_API_KEY
capability:
  consumes:
  - type: http
    namespace: amd-rocm-management-devices
    baseUri: https://rocm-mgmt.amd.com/v1
    description: AMD ROCm Management API — Devices business capability. Self-contained, no shared references.
    resources:
    - name: devices
      path: /devices
      operations:
      - name: listdevices
        method: GET
        description: AMD ROCm List GPU Devices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: devices-deviceId
      path: /devices/{deviceId}
      operations:
      - name: getdevice
        method: GET
        description: AMD ROCm Get GPU Device Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: deviceId
          in: path
          type: string
          description: GPU device identifier (e.g., gpu0, gpu1).
          required: true
    authentication:
      type: bearer
      token: '{{env.ADVANCED_MICRO_DEVICES_API_KEY}}'
  exposes:
  - type: rest
    namespace: amd-rocm-management-devices-rest
    port: 8080
    description: REST adapter for AMD ROCm Management API — Devices. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/devices
      name: devices
      description: REST surface for devices.
      operations:
      - method: GET
        name: listdevices
        description: AMD ROCm List GPU Devices
        call: amd-rocm-management-devices.listdevices
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/devices/{deviceid}
      name: devices-deviceid
      description: REST surface for devices-deviceId.
      operations:
      - method: GET
        name: getdevice
        description: AMD ROCm Get GPU Device Details
        call: amd-rocm-management-devices.getdevice
        with:
          deviceId: rest.deviceId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amd-rocm-management-devices-mcp
    port: 9090
    transport: http
    description: MCP adapter for AMD ROCm Management API — Devices. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amd-rocm-list-gpu-devices
      description: AMD ROCm List GPU Devices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amd-rocm-management-devices.listdevices
      outputParameters:
      - type: object
        mapping: $.
    - name: amd-rocm-get-gpu-device
      description: AMD ROCm Get GPU Device Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amd-rocm-management-devices.getdevice
      with:
        deviceId: tools.deviceId
      outputParameters:
      - type: object
        mapping: $.
